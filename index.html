<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Yggdrasil Descent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon-512.png">
  <meta name="theme-color" content="#06000f">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      width: 100%;
      height: 100%;
      background: #06000f;
    }
    body {
      width: 100%;
      height: 100%;
      background: #06000f;
      overflow: hidden;
      touch-action: none;
    }
    #game-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #06000f;
    }
    #game-container canvas {
      display: block;
      touch-action: none;
    }

    /* Drehen-Overlay für Portrait */
    #rotate-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #0a0015;
      z-index: 9999;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 24px;
      color: #d4af37;
      font-family: serif;
      text-align: center;
    }
    #rotate-overlay .icon {
      font-size: 64px;
      animation: spin 2s ease-in-out infinite;
    }
    #rotate-overlay p {
      font-size: 22px;
      color: #aaaaaa;
      max-width: 280px;
      line-height: 1.5;
    }
    @keyframes spin {
      0%, 100% { transform: rotate(0deg); }
      40% { transform: rotate(90deg); }
      60% { transform: rotate(90deg); }
    }
    @media (orientation: portrait) {
      #rotate-overlay { display: flex; }
    }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <div id="rotate-overlay">
    <div class="icon">📱</div>
    <h2>Gerät drehen</h2>
    <p>Yggdrasil Descent wird im Querformat gespielt</p>
  </div>

  <script src="lib/phaser.min.js"></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
